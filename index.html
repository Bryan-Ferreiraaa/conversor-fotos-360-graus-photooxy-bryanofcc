<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor 360° Universal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Conversor 360° Universal</h1>
            <p>Prepare suas fotos para Facebook, Street View e VR</p>
        </header>

        <div class="controls">
            <label for="file-upload" class="btn primary">
                <span class="icon">📁</span>
                <span class="text">Carregar Foto</span>
            </label>
            <input id="file-upload" type="file" accept="image/*"/>
            
            <button id="download-jpg" class="btn secondary" disabled>💾 Baixar 360° Leve (JPG)</button>
            <button id="download-png" class="btn secondary" disabled>💾 Baixar 360° Full (PNG)</button>
        </div>

        <div id="panorama-container">
            <div id="placeholder-text">Sua foto aparecerá aqui em 360°</div>
        </div>

        <canvas id="conversion-canvas" style="display:none;"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <script src="script.js"></script>
</body>
</html>
